services:
  magma-copy-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magma-copy-manager
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-magma-secret-prod-12345}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-default-encryption-key-32-chars-long}
    volumes:
      - ./data:/home/node/app/data
    ports:
      - "3000:80"

# Note: We removed magma-app as it is now integrated into the magma-core (renamed to magma) image.
# We also removed the separated bridge network as it's a single container now.
