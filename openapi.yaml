                  type: object
                  properties:
                    id:
                      type: string
                    username:
                      type: string
                    printUser:
                      type: string
                    nexudusUser:
                      type: string
                    role:
                      type: string
                    a3NoPaperMode:
                      type: number
                    _links:
                      type: object
                      properties:
                        self:
                          type: string
                        copies:
                          type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
    post:
      tags:
        - Users
      description: Add a new user, All fields are mandatory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - role
                - printUser
                - nexudusUser
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                printUser:
                  type: string
                nexudusUser:
                  type: string
                a3NoPaperMode:
                  type: number
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  printUser:
                    type: string
                  nexudusUser:
                    type: string
                  role:
                    type: string
                  a3NoPaperMode:
                    type: number
                  _links:
                    type: object
                    properties:
                      self:
                        type: string
                      copies:
                        type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
        "403":
          description: Default Response
          content:
