  /api/v1/users/{userId}/copies/:
    get:
      tags:
        - Copies
      description: Get all copies for a user, the from and to are optional.
      parameters:
        - schema:
            type: string
            format: date
          in: query
          name: from
          required: false
        - schema:
            type: string
            format: date
          in: query
          name: to
          required: false
        - schema:
            type: string
          in: path
          name: userId
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    datetime:
                      type: string
                      format: date-time
                    count:
                      type: object
                      properties:
                        a4Color:
                          type: number
                        a4Bw:
                          type: number
                        a3Color:
                          type: number
                        a3Bw:
                          type: number
                    total:
                      type: object
                      properties:
