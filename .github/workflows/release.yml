name: Release Automation
on:
  push:
    branches:
      - main
jobs:
  release:
    # Trigger only if the commit message contains 'Release'
    if: "contains(github.event.head_commit.message, 'Release')"
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Using a GITHUB_TOKEN or a PAT might be needed for pushing tags back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Release Type
        id: vars
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ $MSG =~ "Release major" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ $MSG =~ "Release minor" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ $MSG =~ "Release bugfix" ]]; then
            echo "type=bugfix" >> $GITHUB_OUTPUT
          else
            echo "type=minor" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Release Script (Version Bump & Build)
        env:
          SKIP_GIT_CHECK: "true"
        run: |
          bash scripts/release.sh ${{ steps.vars.outputs.type }}

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Changes
        run: |
          git add package.json core/package.json app/package.json package-lock.json
          git commit -m "chore(release): bump version to ${{ steps.get_version.outputs.version }} [skip ci]"
          git tag v${{ steps.get_version.outputs.version }}
          # Push to main and push tags
          git push origin main --tags

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            oottee/magma-copy-manager:latest
            oottee/magma-copy-manager:${{ steps.get_version.outputs.version }}
