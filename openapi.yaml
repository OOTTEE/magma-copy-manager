              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
