openapi: 3.0.3
info:
  title: Magma API
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /api/v1/auth/me:
    get:
      tags:
        - Auth
      description: Get current user profile if token is valid.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  role:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      description: Refresh access token using a valid refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  role:
                    type: string
                  username:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      description: Logout by revoking the refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "204":
          description: Default Response
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/automation/logs:
    get:
      tags:
        - Automation
      description: Get auto-billing execution logs.
      parameters:
        - schema:
            type: integer
            default: 20
          in: query
          name: limit
          required: false
        - schema:
            type: integer
            default: 0
          in: query
          name: offset
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    datetime:
                      type: string
                    status:
                      type: string
                    details:
                      type: object
                      additionalProperties: true
  /api/v1/automation/trigger:
    post:
      tags:
        - Automation
      description: Manually trigger the auto-billing process.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  logId:
                    type: string
                  status:
                    type: string
                  results:
                    type: array
  /api/v1/automation/sync:
    post:
      tags:
        - Automation
      description: Manually trigger the printer synchronization process.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  logId:
                    type: string
                  status:
                    type: string
                  summary:
                    type: string
  /api/v1/billing/simulations/users/{id}:
    get:
      tags:
        - Billing
      description: Simulates an invoice for a specific user based on current
        consumption and settings.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  username:
                    type: string
                  period:
                    type: object
                    properties:
                      from:
                        type: string
                      to:
                        type: string
                  lines:
                    type: array
                    items:
                      type: object
                      properties:
                        concept:
                          type: string
                        quantity:
                          type: integer
                        unitPrice:
                          type: number
                        total:
                          type: number
                  total:
                    type: number
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/billing/sync:
    get:
      tags:
        - Billing
      description: List all synchronization events with pagination and filtering.
        Admin only.
      parameters:
        - schema:
            type: integer
            default: 1
          in: query
          name: page
          required: false
        - schema:
            type: integer
            default: 20
          in: query
          name: limit
          required: false
        - schema:
            anyOf:
              - type: string
              - type: array
                items:
                  type: string
          in: query
          name: userIds
          required: false
        - schema:
            anyOf:
              - type: string
              - type: array
                items:
                  type: string
          in: query
          name: months
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                        username:
                          type: string
                        month:
                          type: string
                        saleDate:
                          type: string
                        totalQuantity:
                          type: integer
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              type:
                                type: string
                              quantity:
                                type: integer
                              nexudusSaleId:
                                type: string
                        nexudusCoworkerId:
                          type:
                            - "null"
                            - string
                        createdOn:
                          type: string
                  pagination:
                    type: object
                    properties:
                      total_records:
                        type: integer
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      limit:
                        type: integer
    post:
      tags:
        - Billing
      description: Synchronizes current month consumption for a user to Nexudus.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                note:
                  type: string
              required:
                - userId
      responses:
        "200":
          description: Default Response
  /api/v1/billing/sync/users/{id}/status:
    get:
      tags:
        - Billing
      description: Checks if consumption has been synced for a user in the current month.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/v1/billing/sync/{id}:
    get:
      tags:
        - Billing
      description: Returns detail of a specific sync event.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      tags:
        - Billing
      description: Rollback a specific synchronization event. Deletes in Nexudus and
        releases copies in Magma.
      parameters:
        - schema:
            type: boolean
            default: false
          in: query
          name: force
          required: false
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  localId:
                    type: string
                  remoteId:
                    type: integer
                  status:
                    type: string
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/billing/sync/nexudus:
    post:
      tags:
        - Billing
      description: Synchronizes monthly consumption with Nexudus. Admin only.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                        username:
                          type: string
                        salesCreated:
                          type: integer
                        skipped:
                          type: integer
                        errors:
                          type: integer
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/billing/stats:
    get:
      tags:
        - Billing
      description: Get global sales and sync statistics. Admin only.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalSalesThisMonth:
                    type: integer
                  usersPendingSync:
                    type: integer
                  period:
                    type: object
                    properties:
                      from:
                        type: string
                      to:
                        type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/billing/sync/group:
    delete:
      tags:
        - Billing
      description: Rollback a group of synchronization events.
      parameters:
        - schema:
            anyOf:
              - type: string
              - type: array
                items:
                  type: string
          in: query
          name: ids
          required: true
        - schema:
            type: boolean
            default: false
          in: query
          name: force
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    localId:
                      type: string
                    remoteId:
                      type: integer
                    status:
                      type: string
  /api/v1/billing/distributions:
    get:
      tags:
        - Billing
      description: Get current consumption distributions for a user.
      parameters:
        - schema:
            type: string
          in: query
          name: userId
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    nexudusAccountId:
                      type: string
                    type:
                      type: string
                    quantity:
                      type: integer
    post:
      tags:
        - Billing
      description: Save consumption distributions for a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - distributions
              properties:
                userId:
                  type: string
                distributions:
                  type: array
                  items:
                    type: object
                    required:
                      - nexudusAccountId
                      - type
                      - quantity
                    properties:
                      nexudusAccountId:
                        type: string
                      type:
                        type: string
                      quantity:
                        type: integer
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
  /api/v1/copies/:
    get:
      tags:
        - Copies
      description: Get all copy increments sorted by date.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    userId:
                      type: string
                    username:
                      type: string
                    datetime:
                      type: string
                    a4Bw:
                      type: number
                    a4Color:
                      type: number
                    a3Bw:
                      type: number
                    a3Color:
                      type: number
                    a4BwTotal:
                      type: number
                    a4ColorTotal:
                      type: number
                    a3BwTotal:
                      type: number
                    a3ColorTotal:
                      type: number
                    isSynced:
                      type: boolean
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/copies/batch:
    delete:
      tags:
        - Copies
      description: Delete multiple copy increments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: Default Response
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/dashboard/stats:
    get:
      tags:
        - Dashboard
      description: Get historical copy stats for dashboard charts.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    month:
                      type: string
                    total:
                      type: number
  /api/v1/dashboard/activity:
    get:
      tags:
        - Dashboard
      description: Get recent system activity logs.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    datetime:
                      type: string
                    type:
                      type: string
                    status:
                      type: string
                    message:
                      type: string
  /api/v1/dashboard/sync:
    post:
      tags:
        - Dashboard
      description: Triggers a manual printer synchronization process.
      responses:
        "200":
          description: Default Response
  /api/v1/dashboard/billing:
    post:
      tags:
        - Dashboard
      description: Triggers a manual global billing process to Nexudus.
      responses:
        "200":
          description: Default Response
  /api/v1/dashboard/notifications:
    get:
      tags:
        - Dashboard
      description: Get pending system notifications.
      responses:
        "200":
          description: Default Response
  /api/v1/dashboard/notifications/{id}/read:
    patch:
      tags:
        - Dashboard
      description: Mark a notification as read.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/v1/dashboard/customer:
    get:
      tags:
        - Dashboard
      description: Get personal usage statistics and recent sales for the customer.
      responses:
        "200":
          description: Default Response
  /api/v1/info/:
    get:
      tags:
        - System
      description: Get service metadata including version.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
  /api/v1/login/:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  role:
                    type: string
                  username:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
  /api/v1/nexudus/test-connection:
    post:
      tags:
        - Nexudus
      description: Test the connection with Nexudus API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nexudus_email:
                  type: string
                  format: email
                nexudus_password:
                  type: string
                nexudus_url:
                  type: string
              required: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  wasSuccessful:
                    type: boolean
                  message:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/nexudus/businesses:
    get:
      tags:
        - Nexudus
      description: Get all businesses from Nexudus.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/nexudus/currencies:
    get:
      tags:
        - Nexudus
      description: Get all available currencies from Nexudus.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    code:
                      type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/nexudus/products:
    get:
      tags:
        - Nexudus
      description: Get all available products from Nexudus.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/nexudus/coworkers:
    get:
      tags:
        - Nexudus
      description: Search coworkers in Nexudus by name or email.
      parameters:
        - schema:
            type: string
          in: query
          name: search
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    fullName:
                      type: string
                    email:
                      type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/nexudus/coworkers/{id}:
    get:
      tags:
        - Nexudus
      description: Get a specific coworker from Nexudus by ID.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                  fullName:
                    type: string
                  email:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/reports/monthly:
    get:
      tags:
        - Reports
      description: Get accumulated copy counts for the current monthly period (27th to
        27th).
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      from:
                        type: string
                      to:
                        type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        printUser:
                          type: string
                        a4Color:
                          type: integer
                        a4Bw:
                          type: integer
                        a3Color:
                          type: integer
                        a3Bw:
                          type: integer
                        sra3Color:
                          type: integer
                        sra3Bw:
                          type: integer
                        a3NoPaperMode:
                          type: boolean
                        total:
                          type: integer
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/settings/:
    get:
      tags:
        - Settings
      description: Get all system settings.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    patch:
      tags:
        - Settings
      description: Update one or more system settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "204":
          description: Default Response
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
