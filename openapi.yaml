openapi: 3.0.3
info:
  title: Magma API
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /api/v1/auth/me:
    get:
      tags:
        - Auth
      description: Get current user profile if token is valid.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  role:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/billing/simulations/users/{id}:
    get:
      tags:
        - Billing
      description: Simulates an invoice for a specific user based on current
        consumption and settings.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  username:
                    type: string
                  period:
                    type: object
                    properties:
                      from:
                        type: string
                      to:
                        type: string
                  lines:
                    type: array
                    items:
                      type: object
                      properties:
                        concept:
                          type: string
                        quantity:
                          type: integer
                        unitPrice:
                          type: number
                        total:
                          type: number
                  total:
                    type: number
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/billing/invoices:
    get:
      tags:
        - Billing
      description: List all persisted invoices with pagination and filtering. Admin only.
      parameters:
        - schema:
            type: integer
            default: 1
          in: query
          name: page
          required: false
        - schema:
            type: integer
            default: 20
          in: query
          name: limit
          required: false
        - schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          in: query
          name: userIds
          required: false
        - schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          in: query
          name: months
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        userId:
                          type: string
                        username:
                          type: string
                        from:
                          type: string
                        to:
                          type: string
                        total:
                          type: number
                  pagination:
                    type: object
                    properties:
                      total_records:
                        type: integer
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      limit:
                        type: integer
    post:
      tags:
        - Billing
      description: Persists and generates a real invoice for a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
              required:
                - userId
      responses:
        "200":
          description: Default Response
  /api/v1/billing/invoices/users/{id}/status:
    get:
      tags:
        - Billing
      description: Checks if an invoice exists for the current period for a specific user.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/v1/billing/invoices/{id}:
    delete:
      tags:
        - Billing
      description: Deletes an invoice and releases copies.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    get:
      tags:
        - Billing
      description: Returns detail of a specific invoice.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/v1/copies/sync/:
    post:
      tags:
        - Copies
      description: Triggers the printer copies synchronization. Downloads report,
        calculates increments and persists data. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - success
                      - partial_success
                      - error
                  syncedCount:
                    type: number
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        user:
                          type: string
                        message:
                          type: string
                  reportPath:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
  /api/v1/info/:
    get:
      tags:
        - System
      description: Get service metadata including version.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
  /api/v1/login/:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  role:
                    type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  error_type:
                    type: string
                  message:
                    type: string
  /api/v1/print/copies/download/:
    post:
      tags:
        - Printer
      description: Trigger the printer scraper to download the monthly copies CSV file
        physically to the backend server.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  path:
                    type: string
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
  /api/v1/reports/monthly:
    get:
      tags:
        - Reports
      description: Get accumulated copy counts for the current monthly period (27th to
        27th).
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      from:
                        type: string
                      to:
                        type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        printUser:
                          type: string
                        a4Color:
                          type: integer
                        a4Bw:
                          type: integer
                        a3Color:
                          type: integer
                        a3Bw:
                          type: integer
                        sra3Color:
                          type: integer
                        sra3Bw:
                          type: integer
                        a3NoPaperMode:
                          type: boolean
                        total:
                          type: integer
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/settings/:
    get:
      tags:
        - Settings
      description: Get all system settings.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    patch:
      tags:
        - Settings
      description: Update one or more system settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "204":
          description: Default Response
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/v1/users/:
    get:
      tags:
